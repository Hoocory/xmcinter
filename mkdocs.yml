site_name: XMCInter
site_description: Documentation for the legacy XMC analysis interface package.
site_url: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Core Modules:
      - xmcfiles: core-modules/xmcfiles.md
      - wrangle: core-modules/wrangle.md
      - xmcmap: core-modules/xmcmap.md
      - diagnostics: core-modules/diagnostics.md
      - plots: core-modules/plots.md
  - Utilities:
      - astro_utilities: utilities/astro_utilities.md
      - file_utilities: utilities/file_utilities.md
  - Tutorials:
      - Reading XMC Output: tutorials/reading-xmc-output.md
      - Filtering Blobs: tutorials/filtering-blobs.md
      - Creating Maps: tutorials/creating-maps.md
      - Diagnostics: tutorials/diagnostics.md
  - Reference:
      - Function Index: reference/function-index.md
